name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        
    - name: Build project
      run: npm run build
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Add Android platform and Set Icon
      run: |
        npx cap add android
        npm run set-icon
        npx cap sync

    - name: Add alarm permissions to AndroidManifest
      run: |
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        # 在 </manifest> 前插入闹钟相关权限
        sed -i 's|</manifest>|  <!-- 闹钟精确调度 -->\n  <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n  <!-- Android 14+ 全屏闹钟弹窗 -->\n  <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />\n</manifest>|' "$MANIFEST"
        echo "--- Updated AndroidManifest.xml ---"
        cat "$MANIFEST"
        
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        # 强制清理构建缓存，确保新图标资源被重新打包
        rm -rf app/build
        ./gradlew clean assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zen-nap-timer
        path: android/app/build/outputs/apk/debug/app-debug.apk
