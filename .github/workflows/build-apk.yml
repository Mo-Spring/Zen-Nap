name: Build Android APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        
    - name: Install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install --legacy-peer-deps
        
    - name: Build project
      run: npm run build
      
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: Add Android platform and Set Icon
      run: |
        npx cap add android
        npm run set-icon
        npx cap sync

    - name: Inject native alarm channel plugin
      run: |
        PLUGIN_DIR="android/app/src/main/java/com/zennaptimer/alarmchannel"
        mkdir -p "$PLUGIN_DIR"
        cp plugins/alarm-channel/AlarmChannelPlugin.java "$PLUGIN_DIR/"
        
        # 添加闹钟相关权限
        MANIFEST="android/app/src/main/AndroidManifest.xml"
        sed -i 's|</manifest>|  <uses-permission android:name="android.permission.SCHEDULE_EXACT_ALARM" />\n  <uses-permission android:name="android.permission.USE_FULL_SCREEN_INTENT" />\n</manifest>|' "$MANIFEST"
        
        echo "--- Plugin injected ---"
        ls -la "$PLUGIN_DIR/"
        echo "--- Manifest updated ---"
        cat "$MANIFEST"
        
    - name: Build APK
      run: |
        cd android
        chmod +x gradlew
        # 强制清理构建缓存，确保新图标资源被重新打包
        rm -rf app/build
        ./gradlew clean assembleDebug
        
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: zen-nap-timer
        path: android/app/build/outputs/apk/debug/app-debug.apk
