<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Deep Blue Background -->
  <rect width="24" height="24" fill="#121629"/>
  
  <!-- Corrected Crescent Moon (Left Side) -->
  <!-- Tips at (13,5) and (13,19). Distance=14. -->
  <!-- Outer Arc: Radius 8. (Center x ~ 9.13). Extends to left x ~ 1.13. -->
  <!-- Inner Arc: Radius 7.1. (Center x ~ 11.82). Carves out hole. -->
  <path fill="#FFFFFF" d="M 13 5 A 8 8 0 1 0 13 19 A 7.1 7.1 0 0 1 13 5 Z" />
  
  <!-- Large Z (Bottom-Right of the moon, Bright) -->
  <path d="M 15 13 H 19 L 15 17 H 19" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Small Z (Top-Right corner, Dim) -->
  <path d="M 20 5 H 23 L 20 8 H 23" 
        stroke="#FFFFFF" 
        stroke-width="1.5" 
        stroke-opacity="0.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
