<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Deep Blue Background -->
  <rect width="24" height="24" fill="#121629"/>
  
  <!-- Aesthetic Crescent Moon -->
  <!-- Fuller shape, positioned to cradle the Zs -->
  <path fill="#FFFFFF" d="M 11 3 A 9 9 0 1 0 11 21 A 7.5 7.5 0 0 1 11 3 Z" />
  
  <!-- Large Z (Interlocking/Overlapping) -->
  <!-- Layer 1: Background-colored stroke to create the 'cutout' effect -->
  <path d="M 13.5 12.5 H 17.5 L 13.5 16.5 H 17.5" 
        stroke="#121629" 
        stroke-width="3.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  <!-- Layer 2: The actual White Z -->
  <path d="M 13.5 12.5 H 17.5 L 13.5 16.5 H 17.5" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Small Z (Floating away) -->
  <path d="M 19.5 5.5 H 22 L 19.5 8 H 22" 
        stroke="#FFFFFF" 
        stroke-width="1.5" 
        stroke-opacity="0.6" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
