<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Deep Blue Background -->
  <rect width="24" height="24" fill="#121629"/>
  
  <!-- Ring (Delicate White) -->
  <path d="M 12 7.5 A 4.5 4.5 0 1 1 12 16.5 A 4.5 4.5 0 1 1 12 7.5" 
        stroke="#FFFFFF" 
        stroke-width="1.2" 
        stroke-opacity="0.3" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Big Z (Thinner, Pure White) -->
  <path d="M 10 10 H 14 L 10 14 H 14" 
        stroke="#FFFFFF" 
        stroke-width="1.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Small z (Thinner, Semi-transparent White) -->
  <path d="M 14 7 H 15.5 L 14 8.5 H 15.5" 
        stroke="#FFFFFF" 
        stroke-width="1.0" 
        stroke-opacity="0.7" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
