<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Deep Blue Background -->
  <rect width="24" height="24" fill="#121629"/>
  
  <!-- Thinner Moon -->
  <path fill="#FFFFFF" d="M 15 13 A 8 8 0 1 1 6.5 4.5 A 7 7 0 0 0 15 13 Z" />
  
  <!-- Large Z (Bottom-Left, Bright) -->
  <path d="M 16 7 H 19 L 16 10 H 19" 
        stroke="#FFFFFF" 
        stroke-width="1.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Small Z (Top-Right, Dim) -->
  <path d="M 20.5 4 H 22 L 20.5 5.5 H 22" 
        stroke="#FFFFFF" 
        stroke-width="1" 
        stroke-opacity="0.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
