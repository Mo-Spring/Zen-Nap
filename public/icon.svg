<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none">
  <!-- Deep Blue Background -->
  <rect width="24" height="24" fill="#121629"/>
  
  <!-- Thinner C-Shaped Moon (Left Side) -->
  <!-- Outer Arc: x=10, r=9 (Semi-circle to left) -->
  <!-- Inner Arc: x=10, r=7.5 (Carves out the inside) -->
  <path fill="#FFFFFF" d="M 10 3 A 9 9 0 1 0 10 21 A 7.5 7.5 0 0 1 10 3 Z" />
  
  <!-- Large Z (Bottom-Left of the Z group, Bright) -->
  <!-- Positioned around x=14, y=12 -->
  <path d="M 14 12 H 18 L 14 17 H 18" 
        stroke="#FFFFFF" 
        stroke-width="2" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
        
  <!-- Small Z (Top-Right of the Z group, Dim) -->
  <!-- Positioned around x=19, y=6 -->
  <path d="M 19 6 H 22 L 19 9 H 22" 
        stroke="#FFFFFF" 
        stroke-width="1.5" 
        stroke-opacity="0.5" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
</svg>
